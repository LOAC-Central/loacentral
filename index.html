<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law of Attraction Central | The Protocol</title>
    <style>
        body { 
            background-color: #000; 
            color: #f5f5f7; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }

        .banner { 
            width: 100%; 
            max-width: 900px; 
            height: auto; 
            margin-bottom: 40px; 
            display: block;
        }

        .content { 
            border-top: 1px solid #1d1d1f; 
            padding-top: 40px; 
            width: 90%; 
            max-width: 700px; 
        }

        p { 
            font-size: 14px; 
            color: #86868b; 
            letter-spacing: 0.15em; 
            font-weight: 500; 
            margin: 10px 0;
            text-transform: uppercase;
        }

        /* The Re-Launch Callout */
        .relaunch {
            font-size: 18px;
            color: #fff; /* Bright white to stand out */
            letter-spacing: 0.2em;
            font-weight: 600;
            margin-top: 30px;
        }

        .symbols { 
            font-size: 1.5rem; 
            margin-top: 40px; 
            opacity: 0.6; 
            letter-spacing: 20px; 
            padding-left: 20px; 
        }
    </style>
</head>
<body>

    <img src="LAW OF ATTRACTION CENTRAL FB.png" alt="Law of Attraction Central" class="banner">

    <div class="content">
        <p>Structured Thinking</p>
        <p>Sovereign Living</p>
        <p>Conscious Creation</p>
        
        <div class="relaunch">THE 2026 RE-LAUNCH IS UNDERWAY</div>
        
        <div class="symbols">🛡️⚙️📈</div>
    </div>

</body>
</html>
